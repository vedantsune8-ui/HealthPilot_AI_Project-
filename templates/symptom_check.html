{% extends "base.html" %}
{% block content %}
<h2>Symptom Checker</h2>
<div class="row">
    <div class="col-md-6">
        <form method="POST">
            <div class="mb-3">
                <label>Select your symptoms:</label>
                <div class="row">
                    {% for symptom in symptoms %}
                    <div class="col-md-6">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="symptoms" value="{{ symptom }}" id="sym_{{ loop.index }}">
                            <label class="form-check-label" for="sym_{{ loop.index }}">{{ symptom.replace('_', ' ').title() }}</label>
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Predict Disease</button>
        </form>
    </div>
    <div class="col-md-6">
        {% if prediction %}
        <div class="card bg-light">
            <div class="card-body">
                <h4>Prediction Result</h4>
                <p><strong>Possible Disease:</strong> {{ prediction }}</p>
                <p><strong>Confidence:</strong> {{ confidence }}%</p>
                <div class="alert alert-warning">⚠️ This is not a medical diagnosis. Consult a doctor.</div>
            </div>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
