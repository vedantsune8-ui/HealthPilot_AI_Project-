{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-info text-white">BMI Calculator</div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label>Weight (kg)</label>
                        <input type="number" step="0.1" name="weight" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Height (cm)</label>
                        <input type="number" step="0.1" name="height" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-info">Calculate</button>
                </form>
                {% if bmi %}
                <div class="mt-3 alert alert-secondary">
                    Your BMI: <strong>{{ bmi }}</strong><br>
                    Category: <strong>{{ category }}</strong>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
